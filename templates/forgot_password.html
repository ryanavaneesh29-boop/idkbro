{% extends "base.html" %}

{% block title %}Forgot Password - idkbro{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Forgot Password</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}
    <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Email Reset Link</button>
    </form>
    <p class="auth-links">Back to <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
