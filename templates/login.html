{% extends "base.html" %}

{% block title %}Login - idkbro{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Login to idkbro</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="text" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <p class="auth-links"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
    <p class="auth-links">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
