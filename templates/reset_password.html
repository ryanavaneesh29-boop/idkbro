{% extends "base.html" %}

{% block title %}Reset Password - idkbro{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Reset Password</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success">{{ success }}</div>
    <p class="auth-links">Back to <a href="{{ url_for('login') }}">Login</a></p>
    {% else %}
    <form method="POST">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required minlength="4">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Save New Password</button>
    </form>
    {% endif %}
</div>
{% endblock %}
