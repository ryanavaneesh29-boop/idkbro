{% extends "base.html" %}

{% block content %}
<div class="who-container">
    <h1>Who to follow</h1>
    <div class="who-list">
        {% for user in suggestions %}
        <div class="who-card">
            <span class="avatar avatar-sm">
                {% if user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="">
                {% else %}
                    <span>{{ user.display_name[:1]|upper }}</span>
                {% endif %}
            </span>
            <div>
                <a href="{{ url_for('profile', username=user.username) }}" class="user-link">
                    <strong>{{ user.display_name }}</strong>
                    <span class="username">@{{ user.username }}</span>
                </a>
                {% if user.bio %}<p>{{ user.bio }}</p>{% endif %}
            </div>
            <form action="{{ url_for('follow_user', username=user.username) }}" method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <button class="btn btn-primary">Follow</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
